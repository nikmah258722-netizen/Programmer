<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 8.2 - Satuan Relatif %</title>
    <style>
        
        h1 {
            font-size: 5rem;
            color: #ff3e6d;
            text-shadow: 
                1px 1px 0px #b91340,
                2px 2px 0px #b91340,
                3px 3px 0px #b91340,
                4px 4px 0px #b91340,
                5px 5px 0px #b91340,
                10px 10px 20px rgba(0,0,0,0.5);

        .box1 {
            width: 500px;           
            height: 300px;          
            background-color: lightblue; 
            display: block;

        .box2 {
            width: 50%;             
            height: 50%;            
            background-color: lightcoral; 
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1> Box</h1>
    <p>Kotak merah di bawah ini menggunakan ukuran <b>50%</b> dari lebar dan tinggi kotak biru.</p>

    <div class="box1">
        <div class="box2"></div>
    </div>

</body>
