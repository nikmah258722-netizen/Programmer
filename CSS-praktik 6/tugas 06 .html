<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>praktik botrder 1</title>
    <style>
        h2 {
              font-size: 5rem;
            color: #ff3e6d;
            text-shadow: 
                1px 1px 0px #b91340,
                2px 2px 0px #b91340,
                3px 3px 0px #b91340,
                4px 4px 0px #b91340,
                5px 5px 0px #b91340,
                10px 10px 20px rgba(0,0,0,0.5);
        }
        .solid {
            border:3px solid blu skyblue;
            padding:10px;
            background-color: skyblue;
        }
        .dotted {
            border:3px dotted rgb(135, 234, 209);
            padding:10px;
            background-color: rgb(135, 234, 209);
        }
        .double {
            border:5px double rgb(250, 201, 209);
            padding:10px;
            background-color:rgb(250, 201, 209);
        }
        .dashed {
            border:3px dashed rgb(237, 126, 89);
            padding:10px;
            background-color: rgb(237, 126, 89);
        }
        .groove {
            border:3px groove rgb(244, 244, 157);
            padding:10px;
            background-color: rgb(244, 244, 157);
        }
        .ridge {
            border:3px ridge rgb(242, 167, 242);
            padding:10px;
            background-color:rgb(242, 167, 242) ;
        }
    </style>
</head>
<body>
    <h2>CONTOH BORDER CSS</h2>

    <p class="solid">ini border solid</p>
    <p class="dotted">ini border dotted</p>
    <p class="double">ini border double</p>
    <p class="dashed">ini border dashed</p>
    <p class="groove">ini border groove</p>
    <p class="ridge">ini border ridge</p>
</body>
</html>
