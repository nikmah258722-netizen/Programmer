<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Transform - Girly Edition</title>
    <style>
        /* Mengatur background dan font agar lebih estetik */
        body {
            background-color: #fff0f5; /* Lavender Blush */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #5d4037;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        /* Container utama supaya terlihat seperti kartu ucapan */
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            border: 2px solid #ffb6c1;
        }

        h1 {
            text-transform: capitalize;
            color: #d81b60; /* Pink Tua */
            text-shadow: 1px 1px 2px #ffc1e3;
        }

        .upper {
            text-transform: uppercase;
            color: #ff4081;
            font-weight: bold;
        }

        .lower {
            text-transform: lowercase;
            color: #9c27b0; /* Ungu Pastel */
            font-style: italic;
        }

        p {
            line-height: 1.6;
            font-size: 1.1em;
        }

        span {
            padding: 2px 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
 <center>
    <herder>
        <h1>Text tranform</h1>
        <p>by nadlifatun Nikmah</p>
    </herder>
 </center>
    <div class="container">
        <h1>latihan teks transform</h1>
        
        <p>
            <span class="upper">hello world</span> ini adalah contoh paragraf.
            <br><br>
            <span class="lower">TEKS INI DITULIS DENGAN HURUF KAPITAL, TAPI hasilnya
            AKAN MENJADI LOWERCASE. KARENA CSS YANG MENGATURNYA.
            </span>
        </p>
    </div>

</body>
</html>
