<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow visible</title>
    <style>
        div {
            background-color: coral;
            width: 200px;
            height: 65px;
            border: 1px solid;
            overflow: visible;
        }
    </style>
</head>
<body>
    <h2>Overflow: vidible</h2>
    <p>By default, the overlow is visible,
        meaning that it is not clipped and it
        rendres outsidethe element's box
    </p>
    <div>You cen use the overflow property 
        when you want to have better control of the layout.
        the overeflow property specifies what happens 
        if content overflows an element's box
    </div>
</body>
</html>
