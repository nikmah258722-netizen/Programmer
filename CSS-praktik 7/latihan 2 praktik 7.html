<!DOCTYPE html>
<html>
<head>
    <title>Latihan 2 Layout</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            color: rgb(236, 190, 190);
         
        }

        .header {
            width: 100%;
            height: 100px;
            background-color: #062e49;
            line-height: 100px;
          
        }

        .content {
            width: 100%;
            height: 300px;
            background-color: #064822;
            line-height: 300px;
            
        }

        .footer {
            width: 100%;
            height: 80px;
            background-color: #420b04;
            line-height: 80px;
           
        
        }
    </style>
</head>
<body>

<div class="header">HEADER (100px)</div>
<div class="content">CONTENT (300px)</div>
<div class="footer">FOOTER (80px)</div>

</body>
</html>
