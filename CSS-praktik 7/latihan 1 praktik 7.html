<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>units</title>
    <style>
        .box1 {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            border: 2px solid black;
        }
        .box2 {
            width: 50%;
            height: 150px;
            background-color: rgb(246, 216, 221);
             border: 100% solid black;

        }
        .box3 {
             width: 80vw;
            height: 30vh;
            background-color: rgb(202, 241, 186);
             border: 100% solid black;
        }
    </style>
</head>
<body>
    <p>
    <div class="box1">
        Box 200px x 200px
    </div>
    </p>

    <p>
    <div class="box2">
        box 50% x 150px
    </div>
    </p>

    <p>
        <div class="box3">
            80vw x 30vh
        </div>
    </p>
</body>
</html>
