<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            position:relative;
            width: 300px;
            height: 300px;
            background-color: lightgray;
        }
        .Box1{
            position:absolute;
            top: 0px;
            left: 0px;
            background-color: coral;
            width: 100px;
            height: 100px;
          
        }
        .Box2{
            position: absolute;
            top: 200px;
            left: 200px;
            background-color: blueviolet;
             width: 100px;
            height: 100px;
        }
        .Box3{
            position: absolute;
            top: 0px;
            left: 200px;
            background-color: red;
             width: 100px;
            height: 100px;
        }
         .Box4{
            position: absolute;
            top: 200px;
            left: 0px;
            background-color: blue;
             width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="Box1"></div>
        <div class="Box2"></div>
        <div class="Box3"></div>
        <div class="Box4"></div>
    </div>
</body>
</html>
